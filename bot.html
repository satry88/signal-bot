<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>⚡ Signal Bot Pro</title>
<style>
:root{--bg:#060a0f;--panel:#0d1117;--border:#1a2332;--green:#00ff88;--red:#ff3355;--gold:#f59e0b;--blue:#38bdf8;--text:#e2e8f0;--muted:#64748b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Tahoma,sans-serif;}
.header{background:linear-gradient(135deg,#0d1117,#1a2332);padding:14px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:17px;font-weight:900;color:var(--green);}
.logo span{color:var(--muted);font-size:10px;display:block;}
.refresh-btn{background:rgba(0,255,136,0.1);border:1px solid var(--green);color:var(--green);padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:700;}
.tabs{display:flex;gap:4px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;}
.tab{flex-shrink:0;padding:8px 16px;border-radius:20px;border:1px solid var(--border);color:var(--muted);font-size:13px;cursor:pointer;font-weight:600;}
.tab.active{background:var(--green);color:#000;border-color:var(--green);}
.timeframes{display:flex;gap:6px;padding:0 16px 12px;}
.tf{padding:5px 12px;border-radius:6px;font-size:12px;border:1px solid var(--border);color:var(--muted);cursor:pointer;font-weight:700;}
.tf.active{background:rgba(56,189,248,0.15);color:var(--blue);border-color:var(--blue);}
.signal-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;margin:0 16px 10px;overflow:hidden;}
.signal-card.buy{border-right:4px solid var(--green);}
.signal-card.sell{border-right:4px solid var(--red);}
.signal-card.neutral{border-right:4px solid var(--muted);}
.card-top{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 8px;}
.sym{font-size:17px;font-weight:900;font-family:monospace;}
.price{font-size:14px;font-weight:700;font-family:monospace;}
.chg{font-size:11px;}
.sig-badge{padding:7px 12px;border-radius:8px;font-weight:900;font-size:13px;}
.sig-badge.buy{background:rgba(0,255,136,0.12);color:var(--green);}
.sig-badge.sell{background:rgba(255,51,85,0.12);color:var(--red);}
.sig-badge.neutral{background:rgba(100,116,139,0.12);color:var(--muted);}
.inds{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:0 10px 10px;}
.ind{background:var(--bg);border-radius:7px;padding:7px;text-align:center;}
.ind-n{font-size:9px;color:var(--muted);margin-bottom:2px;}
.ind-v{font-size:11px;font-weight:700;font-family:monospace;}
.ind-s{font-size:9px;margin-top:2px;font-weight:600;}
.str-row{padding:0 14px 10px;}
.str-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px;}
.str-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.str-fill{height:100%;border-radius:3px;}
.loading{text-align:center;padding:40px 16px;color:var(--muted);}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.section-title{padding:6px 16px;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.last-update{color:var(--blue);font-size:11px;text-align:center;padding:6px;}
.status{font-size:11px;color:var(--muted);text-align:center;padding:4px;}
.footer{text-align:center;padding:16px;color:var(--muted);font-size:10px;line-height:1.8;}
</style>
</head>
<body>
<div class="header">
  <div class="logo">⚡ Signal Bot Pro<span>Binance + Finnhub • حقيقي</span></div>
  <button class="refresh-btn" onclick="loadAll()">🔄 تحديث</button>
</div>
<div class="tabs">
  <div class="tab active" onclick="switchTab('crypto',this)">₿ عملات</div>
  <div class="tab" onclick="switchTab('stocks',this)">📈 أسهم</div>
  <div class="tab" onclick="switchTab('metals',this)">🥇 معادن</div>
</div>
<div class="timeframes">
  <div class="tf active" onclick="switchTF('1h',this)">1H</div>
  <div class="tf" onclick="switchTF('4h',this)">4H</div>
  <div class="tf" onclick="switchTF('1d',this)">1D</div>
  <div class="tf" onclick="switchTF('1w',this)">1W</div>
</div>
<div id="statusMsg" class="status"></div>
<div id="lastUpdate" class="last-update"></div>
<div id="container"></div>
<div class="footer">⚠️ للأغراض التعليمية فقط<br>Signal Bot Pro © 2026</div>

<script>
const BASE = window.location.origin; // Railway URL automatically

const SYMBOLS = {
  crypto: ['BTCUSDT','ETHUSDT','SOLUSDT','BNBUSDT','XRPUSDT','DOGEUSDT','ADAUSDT','AVAXUSDT','DOTUSDT','LINKUSDT'],
  stocks: ['NVDA','AAPL','MSFT','META','GOOG','TSLA','AMZN','PLTR'],
  metals: ['XAUUSD','XAGUSD']
};

let tab='crypto', tf='1h';

window.onload = () => loadAll();

function switchTab(t,el){tab=t;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));el.classList.add('active');loadAll();}
function switchTF(t,el){tf=t;document.querySelectorAll('.tf').forEach(x=>x.classList.remove('active'));el.classList.add('active');loadAll();}

async function fetchBinance(sym){
  const r=await fetch(`https://api.binance.com/api/v3/klines?symbol=${sym}&interval=${tf}&limit=150`);
  const d=await r.json();
  return{c:d.map(x=>+x[4]),h:d.map(x=>+x[2]),l:d.map(x=>+x[3]),v:d.map(x=>+x[5])};
}

async function fetchProxy(sym,type='stock'){
  const resMap={'1h':'60','4h':'240','1d':'D','1w':'W'};
  const res=resMap[tf]||'60';
  const to=Math.floor(Date.now()/1000);
  const secMap={'60':3600,'240':14400,'D':86400,'W':604800};
  const from=to-200*(secMap[res]||86400);
  const r=await fetch(`${BASE}/candle?symbol=${sym}&resolution=${res}&from=${from}&to=${to}&type=${type}`);
  const d=await r.json();
  if(d.s!=='ok')throw new Error('No data');
  return{c:d.c,h:d.h,l:d.l,v:d.v};
}

function rsi(c,p=14){if(c.length<p+1)return null;let g=0,l=0;for(let i=1;i<=p;i++){const d=c[i]-c[i-1];d>0?g+=d:l-=d;}let ag=g/p,al=l/p;for(let i=p+1;i<c.length;i++){const d=c[i]-c[i-1];ag=(ag*(p-1)+(d>0?d:0))/p;al=(al*(p-1)+(d<0?-d:0))/p;}return al===0?100:Math.round(100-100/(1+ag/al));}
function ema(c,p){if(c.length<p)return null;const k=2/(p+1);let e=c.slice(0,p).reduce((a,b)=>a+b)/p;for(let i=p;i<c.length;i++)e=c[i]*k+e*(1-k);return e;}
function macd(c){const e12=ema(c,12),e26=ema(c,26);if(!e12||!e26)return null;return{val:+(e12-e26).toFixed(4),bull:e12>e26};}
function bb(c,p=20){if(c.length<p)return null;const s=c.slice(-p),m=s.reduce((a,b)=>a+b)/p;const std=Math.sqrt(s.reduce((a,b)=>a+(b-m)**2)/p);return{u:m+2*std,m,l:m-2*std};}
function stoch(c,h,l,p=14){if(c.length<p)return null;const hh=Math.max(...h.slice(-p)),ll=Math.min(...l.slice(-p));return hh===ll?50:Math.round((c[c.length-1]-ll)/(hh-ll)*100);}

function analyze(data,sym){
  const c=data.c,h=data.h,l=data.l,v=data.v||[];
  const price=c[c.length-1],prev=c[c.length-2];
  const chg=(price-prev)/prev*100;
  const R=rsi(c),M=macd(c),B=bb(c),ST=stoch(c,h,l);
  const E20=ema(c,20),E50=ema(c,50);
  let buy=0,sell=0,rS='⚪',mS='⚪',bS='⚪',eS='⚪',sS='⚪',vS='⚪';
  if(R!==null){if(R<30){buy+=25;rS='🟢 ذروة بيع';}else if(R<45){buy+=10;rS='🟡 منخفض';}else if(R>70){sell+=25;rS='🔴 ذروة شراء';}else if(R>55){sell+=10;rS='🟡 مرتفع';}else rS='⚪ محايد';}
  if(M){M.bull?(buy+=20,mS='🟢 صاعد'):(sell+=20,mS='🔴 هابط');}
  if(B){if(price<B.l){buy+=20;bS='🟢 أسفل';}else if(price>B.u){sell+=20;bS='🔴 أعلى';}else if(price<B.m){buy+=5;bS='🟡 أسفل وسط';}else{sell+=5;bS='🟡 أعلى وسط';}}
  if(E20&&E50){if(E20>E50&&price>E20){buy+=20;eS='🟢 صاعد';}else if(E20<E50&&price<E20){sell+=20;eS='🔴 هابط';}else eS='⚪ محايد';}
  if(ST!==null){if(ST<20){buy+=15;sS='🟢 ذروة بيع';}else if(ST>80){sell+=15;sS='🔴 ذروة شراء';}else sS='⚪ محايد';}
  if(v.length>10){const avg=v.slice(-11,-1).reduce((a,b)=>a+b)/10,cur=v[v.length-1];if(cur>avg*1.3){chg>0?(buy+=10,vS='🟢 مرتفع'):(sell+=10,vS='🔴 مرتفع');}else vS='⚪ عادي';}
  const signal=buy>sell+20?'buy':sell>buy+20?'sell':'neutral';
  const str=Math.round(Math.max(buy,sell)/(buy+sell||1)*100);
  return{sym,price,chg,signal,str,buy,sell,R,M,B,ST,E20,E50,rS,mS,bS,eS,sS,vS};
}

function card(s){
  const cc=s.chg>=0?'var(--green)':'var(--red)';
  const sc=s.signal==='buy'?'var(--green)':s.signal==='sell'?'var(--red)':'var(--muted)';
  const em=s.signal==='buy'?'🟢 شراء':s.signal==='sell'?'🔴 بيع':'⚪ محايد';
  const fp=s.signal==='neutral'?50:s.str;
  const pf=s.price<0.001?s.price.toFixed(6):s.price<1?s.price.toFixed(4):s.price<100?s.price.toFixed(3):s.price.toFixed(2);
  const tfL={'1h':'1H','4h':'4H','1d':'1D','1w':'1W'}[tf];
  return`<div class="signal-card ${s.signal}">
    <div class="card-top">
      <div><div class="sym">${s.sym}</div><div style="font-size:10px;color:var(--muted)">${tfL}</div></div>
      <div style="text-align:center"><div class="price" style="color:${cc}">${pf}</div><div class="chg" style="color:${cc}">${s.chg>=0?'+':''}${s.chg.toFixed(2)}%</div></div>
      <div class="sig-badge ${s.signal}">${em}</div>
    </div>
    <div class="str-row">
      <div class="str-lbl"><span>🟢 ${s.buy}</span><span>قوة ${s.str}%</span><span>${s.sell} 🔴</span></div>
      <div class="str-bar"><div class="str-fill" style="width:${fp}%;background:${sc}"></div></div>
    </div>
    <div class="inds">
      <div class="ind"><div class="ind-n">RSI(14)</div><div class="ind-v">${s.R??'-'}</div><div class="ind-s">${s.rS}</div></div>
      <div class="ind"><div class="ind-n">MACD</div><div class="ind-v" style="font-size:10px">${s.M?s.M.val:'-'}</div><div class="ind-s">${s.mS}</div></div>
      <div class="ind"><div class="ind-n">Stoch</div><div class="ind-v">${s.ST??'-'}</div><div class="ind-s">${s.sS}</div></div>
      <div class="ind"><div class="ind-n">EMA20</div><div class="ind-v" style="font-size:10px">${s.E20?s.E20.toFixed(2):'-'}</div><div class="ind-s">${s.eS}</div></div>
      <div class="ind"><div class="ind-n">BB Upper</div><div class="ind-v" style="font-size:10px">${s.B?s.B.u.toFixed(2):'-'}</div><div class="ind-s">${s.bS}</div></div>
      <div class="ind"><div class="ind-n">Volume</div><div class="ind-v">📊</div><div class="ind-s">${s.vS}</div></div>
    </div>
  </div>`;
}

async function loadAll(){
  const con=document.getElementById('container');
  con.innerHTML=`<div class="loading"><div class="spinner"></div>جاري التحليل...</div>`;
  const syms=SYMBOLS[tab];
  const results=[];
  let ok=0,fail=0;
  for(const sym of syms){
    try{
      let data;
      if(tab==='crypto') data=await fetchBinance(sym);
      else if(tab==='stocks') data=await fetchProxy(sym,'stock');
      else data=await fetchProxy(sym,'forex');
      if(data?.c?.length>20){results.push(analyze(data,tab==='crypto'?sym.replace('USDT',''):sym));ok++;}
    }catch(e){fail++;console.warn(sym,e.message);}
  }
  document.getElementById('statusMsg').textContent=`✅ ${ok} رمز • ❌ ${fail} فشل`;
  results.sort((a,b)=>{const o={buy:0,sell:1,neutral:2};return o[a.signal]!==o[b.signal]?o[a.signal]-o[b.signal]:b.str-a.str;});
  if(!results.length){con.innerHTML=`<div class="loading" style="color:var(--red)">❌ لا توجد بيانات</div>`;return;}
  const buys=results.filter(r=>r.signal==='buy');
  const sells=results.filter(r=>r.signal==='sell');
  const neut=results.filter(r=>r.signal==='neutral');
  let html='';
  if(buys.length) html+=`<div class="section-title">🟢 شراء (${buys.length})</div>`+buys.map(card).join('');
  if(sells.length) html+=`<div class="section-title">🔴 بيع (${sells.length})</div>`+sells.map(card).join('');
  if(neut.length) html+=`<div class="section-title">⚪ محايد (${neut.length})</div>`+neut.map(card).join('');
  con.innerHTML=html;
  document.getElementById('lastUpdate').textContent=`آخر تحديث: ${new Date().toLocaleTimeString('ar')}`;
}
</script>
</body>
</html>
